# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1.0

# MongoDB Configuration
# Using the placeholder ensures Render's MONGO_URI is used
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.auto-index-creation=true

# Security & Auth
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Clerk Configuration
clerk.issuer=https://mature-pelican-89.clerk.accounts.dev
clerk.jwks-url=https://mature-pelican-89.clerk.accounts.dev/.well-known/jwks.json
# This is the Secret Key your JWT Filter needs to stop the 403 errors
clerk.secret.key=${CLERK_SECRET_KEY}
clerk.webhook.secret=${CLERK_WEBHOOK_SECRET}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Cloudinary (Using placeholders for security)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# Payment Gateway
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# Logging for Debugging
logging.level.org.springframework.security=DEBUG